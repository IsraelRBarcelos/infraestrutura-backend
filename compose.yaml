services:
  db:
    image: postgis/postgis:16-3.4 # Versão mais recente e estável do PostGIS
    container_name: photomap-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: photomap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d photomap"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: